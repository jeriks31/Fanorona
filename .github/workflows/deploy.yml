name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet workload install wasm-tools # for RunAOTCompilation
      - run: dotnet test
      - run: dotnet publish Fanorona.Web -c Release -o publish
      # The site is served at https://<user>.github.io/Fanorona/, not at the root.
      - run: sed -i 's|<base href="/" />|<base href="/Fanorona/" />|' publish/wwwroot/index.html
      - run: touch publish/wwwroot/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
